name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Check out the code
    - name: Check out code
      uses: actions/checkout@v4  # Ensure you are using the latest v3 of checkout

    # Set up .NET SDK
    - name: Set up .NET
      uses: actions/setup-dotnet@v3  # Ensure you are using the latest v3 of setup-dotnet
      with:
        dotnet-version: '8.0'

    # Restore dependencies for the entire project
    - name: Restore dependencies
      run: dotnet restore

    # Build the Console project (AwesomeBank.Console)
    - name: Build the Console project (AwesomeBank.Console)
      run: dotnet build ./AwesomeBank.Console/AwesomeBank.Console.csproj --configuration Release

    # Build the Test project (AwesomeBank.Test) before running tests
    - name: Build the Test project (AwesomeBank.Test)
      run: dotnet build ./AwesomeBank.Test/AwesomeBank.Test.csproj --configuration Release  # Explicitly build the test project

    # Run CodeQL analysis
    - name: Set up CodeQL
      uses: github/codeql-action/setup-codeql@v3  # Setup the CodeQL action
      with:
        languages: 'csharp'  # Specify the languages to scan

    - name: Run CodeQL analysis
      uses: github/codeql-action/analyze@v3  # Run CodeQL scan
      with:
        category: 'default'  # Default category for analysis

    # Check if CodeQL scan succeeded, only proceed with tests if successful
    - name: Check CodeQL results
      if: failure()  # If CodeQL failed, this will stop the flow.
      run: echo "CodeQL scan failed, stopping workflow" && exit 1

    # Run tests (with the correct test DLL)
    - name: Run tests (with the correct test DLL)
      run: dotnet test ./AwesomeBank.Test/AwesomeBank.Test.csproj --configuration Release --no-build  # Explicitly run tests for the test project

    # Create release package (ZIP) for AwesomeBank.Console
    - name: Create release package (ZIP) for AwesomeBank.Console
      if: success()
      run: |
        dotnet publish ./AwesomeBank.Console/AwesomeBank.Console.csproj --configuration Release --output ./publish
        zip -r SimpleBank-v1.zip ./publish  # Create the ZIP for only this project

    # Upload release artifact
    - name: Upload release artifact
      if: success()  # Only upload if the package is created
      uses: actions/upload-artifact@v4  # Updated to v4
      with:
        name: SimpleBank-Release
        path: ./SimpleBank-v1.zip  # Path to the generated ZIP file
