name: Build, Test and Create Release Package 

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: '8.0'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release

    - name: Run tests
      run: dotnet test --configuration Release --no-build

    - name: Create release package (ZIP)
      if: success()  # Only create the package if all tests passed
      run: |
        # Set the version from the latest Git tag, or fallback to "1.0.0"
        VERSION=$(git describe --tags --abbrev=0 || echo "1.0.0")

        # Publish the app to the 'publish' folder
        dotnet publish --configuration Release --output ./publish

        # Create a ZIP file with the release version
        zip -r SimpleBank-${VERSION}.zip ./publish

    - name: Upload release artifact
      if: success()  # Only upload if the package is created
      uses: actions/upload-artifact@v3  # Updated to v3
      with:
        name: SimpleBank-Release
        path: SimpleBank-${{ steps.create-release-package.outputs.VERSION }}.zip
